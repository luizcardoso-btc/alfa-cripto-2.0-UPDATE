<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Alfa Cripto Sinais — Login</title>
  <link rel="stylesheet" href="login.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="brand">
        <div class="brand-icon">α</div>
        <div class="brand-text">
          <span class="brand-name">ALFA CRIPTO</span>
          <span class="brand-sub">SINAIS INTELIGENTES</span>
        </div>
      </div>

      <h1 id="formTitle">Acesse sua conta</h1>
      <p class="subtitle" id="formSubtitle">Entre com o email e senha que você recebeu após a compra.</p>

      <div class="alert" id="alertBox" style="display:none"></div>

      <form id="loginForm">
        <div class="field">
          <label>EMAIL</label>
          <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" required/>
        </div>
        <div class="field">
          <label>SENHA</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">ENTRAR</button>
      </form>

      <div class="help-box">
        <p>🔑 Acabou de comprar? Sua senha temporária foi enviada por email.</p>
        <p>❓ Não recebeu ou perdeu a senha? <a href="mailto:suporte@alfacriptosinais.com">Fale com o suporte</a></p>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
